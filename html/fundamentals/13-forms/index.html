<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <form action="index.php" method="POST" enctype="multipart/form-data">

        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="username" minlength="4" maxlength="10" required> <br>

        <label for ="password">Password:</label>
        <input type="password" id="password" minlength="8" maxlength="15" required> <br>
       
        <label for ="email">Email</label>
        <input type="email" id="email" placeholder="example@gmail.com" required> <br>

        <label for="phone">Phone No</label>
        <input type="tel" id="phone" placeholder="98XXXXXXXX" pattern="[0-9]{10}" minlength="10" maxlength="10" required> <br>

        <label for="bday">Birth Date</label>
        <input type="date" id="bday"> <br>

        <label for="age">Age</label>
        <input type="number" id="age" min="0" max="100" value="1"> <br>

        <label for="title">Title:</label>

        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="title">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Ms." name="title">
        <label for="Dr.">Dr.</label> 
        <input type="radio" id="Dr." value="Dr." name="title"> <br>

        <label for="education">Education:</label>
        <select id="education">
            <option value="school">School</option>
            <option value="highschool">High School</option>
            <option value="undergrad">Undergrad</option>
            <option value="postgrad">Postgrad</option>
        </select> <br>
        
        <label for="subscribe">Subscribe:</label>
        <input type="checkbox" id="subscribe"> <br>

        <label for="comment">Comment:</label>
        <textarea style="resize:none;" id="comment" rows="3" cols="25"></textarea> <br>

        <label for="file">File:</label>
        <input type="file" id="file" accept="image/png,image/jpeg"> <hr>
        
        <input type ="reset"> <br>

        <input type="submit"> 

    </form>

</body>
</html>
